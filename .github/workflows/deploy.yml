name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 提到 job 级：install/split/build 全共享，确保 build 拿到正确 base，
      # 资源路径才指向 /fde-report-wiki/assets/ 而非根路径（否则线上资源 404、样式全挂）
      VITEPRESS_BASE: /fde-report-wiki/
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # 用 npm install 而非 npm ci：CI 的 node npm 与本地解析传递依赖(search-insights 等)不一致，
      # npm ci 对 lock 完整性零容忍会失败；本站仅锁 vitepress，install 足够鲁棒。
      - run: npm install --no-fund --no-audit
      # base 由 job 级 env VITEPRESS_BASE 提供
      - run: npm run split
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
